<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS 우선순위 (Specificity)</title>
    <style>
      p {
        color: blue; /* 태그 선택자 */
      }

      .highlight {
        color: red; /* 클래스 선택자 */
      }

      #unique {
        color: green; /* ID 선택자 */
      }

      p.inline-style {
        color: black !important; /* !important */
      }
    </style>
  </head>
  <body>
    <p id="unique" class="highlight inline-style ">CSS 우선순위 예시입니다!</p>
    <p>!important(무조건 적용) > #unique(ID 선택자) > .highlight(클래스 선택자) > p(태그선택자)</p>   
    <p class="highlight">!important: 무조건 적용이므로 자주 사용하시면 안되요!</p>
  </body>
</html>
