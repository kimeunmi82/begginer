<!DOCTYPE html> <!--이 문서가 HTML5로 작성되었음을 선언-->
<html lang="en"> <!--문서의 언어를 지정-->
<head> <!--문서에 대한 메타 정보를 담고 있다.-->
    <meta charset="UTF-8"> <!--문자 인코딩-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--모바일 기기에서 적절한 뷰포트를 설정-->
    <title>문서 제목</title> <!--문서의 제목을 정의-->
</head>
<body><!--실제 콘텐츠가 들어가는 부-->
    <h1>Hello World!</h1>
    <p>이것은 간단한 HTML 문서입니다.</p>
</body>
</html>
