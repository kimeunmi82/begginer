<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS 단위 (Units)</title>
    <style>
      .container1 {
        width: 50%;  /* 부모 요소 너비의 50% */
        padding: 1rem; /* 기본 글꼴 크기의 1배 */
        margin: 20px; /* 20 픽셀 */
        font-size: 2em; /* 현재 글꼴 크기의 2배 */
        border: 5px solid red;
      }
      .container2 {
        width: 30%;  /* 부모 요소 너비의 50% */
        padding: 2rem; /* 기본 글꼴 크기의 1배 */
        margin: 50px; /* 20 픽셀 */
        font-size: 1em; /* 현재 글꼴 크기의 2배 */
        border: 5px solid green;
      }
    </style>
  </head>
  <body>
    <div class="container1">CSS 단위1 (Units)</div>
    <hr/>
    <div class="container2">CSS 단위2 (Units)</div>    
  </body>
</html>
